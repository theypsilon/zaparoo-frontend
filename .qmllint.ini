[General]
# qmllint configuration for Zaparoo Frontend.
# Generated / maintained manually.

[Warnings]
UnqualifiedAccess=warning
# Warn when accessing properties without explicit qualification.

UnusedImports=warning
# Warn on imports that are never used.

WithStatement=warning
# Warn on use of with statements (JS anti-pattern).

MultilineStrings=warning
# Warn on multiline string literals.

InheritanceCycle=error
# Error on QML inheritance cycles.

Deprecated=warning
# Warn on deprecated type usage.

BadSignalHandler=warning

CompilerWarnings=warning
# Enables the QML compiler category (helps with qmlsc optimization hints).

PropertyAliasCycles=error
