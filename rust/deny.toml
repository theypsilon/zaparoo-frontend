[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "armv7-unknown-linux-gnueabihf" },
]

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked  = "deny"
ignore  = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "Zlib",
    "Unicode-3.0",
    "LicenseRef-PolyForm-Noncommercial-1.0.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions    = "deny"
wildcards            = "deny"
allow-wildcard-paths = true  # Workspace path deps have no version pin; this is fine.

# Known transitive duplicates we can't resolve without forking upstream.
# Entries are version-pinned so a future additional duplicate (e.g. a third
# thiserror) trips the check rather than being silently swallowed.
# Audit this list whenever cxx-qt, tungstenite, or tracing-appender are bumped.
skip = [
    # cxx-qt-build pulls codespan-reporting 0.11 directly; its cxx-gen dep pulls 0.13.
    { crate = "codespan-reporting@0.11.1" },
    { crate = "codespan-reporting@0.13.1" },
    # codespan-reporting 0.11 → unicode-width 0.1; codespan-reporting 0.13 → 0.2.
    { crate = "unicode-width@0.1.14" },
    { crate = "unicode-width@0.2.2" },
    # tempfile+uuid hold getrandom 0.4; rand 0.9 (via tungstenite) brings 0.3.
    # (0.3 is build-script-only in the linux/armv7 filtered graph so cargo-deny
    # doesn't surface it; listing it here would warn as unmatched.)
    { crate = "getrandom@0.4.2" },
    # tracing-appender + tungstenite are on thiserror 2; cxx-qt still on 1.
    { crate = "thiserror@1.0.69" },
    { crate = "thiserror@2.0.18" },
    { crate = "thiserror-impl@1.0.69" },
    { crate = "thiserror-impl@2.0.18" },
]

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
