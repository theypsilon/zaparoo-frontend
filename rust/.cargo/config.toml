# Desktop: use system C compiler as the linker driver. Rust's default
# (rust-lld / LLVM lld) rejects non-PIC relocations in the Zaparoo static
# libs (compiled without -fPIC). GCC/BFD ld accepts this combination.
[target.x86_64-unknown-linux-gnu]
linker = "cc"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

# ARM32 / MiSTer: use the ARM cross-compiler as the linker driver.
# The linker binary is the MiSTer ARM GCC toolchain; cargo sets this when
# CMAKE_TOOLCHAIN_FILE points to arm32-toolchain.cmake.
[target.armv7-unknown-linux-gnueabihf]
linker = "arm-none-linux-gnueabihf-gcc"
