name: Build ARM32 toolchain image

on:
  # On main, a push that touches scripts/toolchain/VERSION or
  # Dockerfile.toolchain auto-publishes the matching image. The "check
  # if version exists" gate below makes the workflow a no-op when the
  # tag is already in the registry, so re-runs are cheap and idempotent.
  push:
    branches: [main]
    paths:
      - 'scripts/toolchain/VERSION'
      - 'Dockerfile.toolchain'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 6.10.3-1)'
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        description: 'Optional override; defaults to scripts/toolchain/VERSION contents'
        required: false
        type: string
    outputs:
      version:
        description: 'The toolchain image version that was built or verified'
        value: ${{ jobs.build.outputs.version }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          # Prefer this workflow's own input (unified across workflow_dispatch
          # and workflow_call via the `inputs` context); fall back to the
          # file pinned in the repo.
          if [ -n "${INPUT_VERSION}" ]; then
            VERSION="${INPUT_VERSION}"
          elif [ -f scripts/toolchain/VERSION ]; then
            VERSION=$(tr -d '[:space:]' < scripts/toolchain/VERSION)
          else
            echo "Error: no inputs.version provided and scripts/toolchain/VERSION is missing" >&2
            exit 1
          fi
          # Docker tag grammar: first char [A-Za-z0-9_], then up to 127 of
          # [A-Za-z0-9_.-]. Validating here surfaces a typo with a clear
          # message instead of deep inside docker manifest inspect / push.
          if ! printf '%s' "${VERSION}" | grep -Eq '^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$'; then
            echo "Error: version '${VERSION}' is not a valid Docker tag" >&2
            echo "       (must match [A-Za-z0-9_][A-Za-z0-9_.-]{0,127})" >&2
            exit 1
          fi
          printf 'version=%s\n' "${VERSION}" >> "$GITHUB_OUTPUT"
          printf 'Building toolchain version: %s\n' "${VERSION}"

      - name: Set lowercase repository owner
        run: |
          echo "OWNER_LC=${OWNER,,}" >> "$GITHUB_ENV"
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if version exists
        id: check
        run: |
          if docker manifest inspect ghcr.io/${{ env.OWNER_LC }}/qt6-arm32-mister:${{ steps.version.outputs.version }} > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.version.outputs.version }} already exists in registry"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.version.outputs.version }} will be built"
          fi

      # Qt's PCH compilation in qtdeclarative-arm-build exhausts the runner
      # disk (~14 GB usable of 22 GB) once the image layers contain the ARM
      # GCC toolchain, four Qt source trees, and the host + ARM builds. Freeing
      # the pre-installed Android SDK / .NET / Haskell / tool-cache recovers
      # ~30 GB and is cheap (~3 min).
      - name: Free disk space
        if: steps.check.outputs.exists != 'true'
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true
          docker-images: true

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists != 'true'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      # Only move :latest on main — workflow_dispatch runs on arbitrary
      # branches could otherwise point :latest at an older/test toolchain.
      - name: Compute tags
        id: tags
        env:
          IMAGE: ghcr.io/${{ env.OWNER_LC }}/qt6-arm32-mister
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          {
            echo 'tags<<EOF'
            echo "${IMAGE}:${VERSION}"
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              echo "${IMAGE}:latest"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        if: steps.check.outputs.exists != 'true'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile.toolchain
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=toolchain
          cache-to: type=gha,mode=max,scope=toolchain
